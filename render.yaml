# Render Blueprint — Kadamba API + static frontend.
# Secrets (sync: false) must be filled in the Render dashboard after import.
services:
  - type: web
    name: kadamba-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    # Force full install (NODE_ENV=production would skip TypeScript). Prefer
    # npm install over npm ci so optional peer lock drift does not block deploys.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: info
      # PORT is provided automatically by Render.
      - key: FRONTEND_URL
        sync: false          # e.g. https://kadamba-3lc7.onrender.com
      - key: MONGODB_URI
        sync: false          # MongoDB Atlas SRV connection string
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: UPLOAD_STORAGE
        value: local
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      # First-admin bootstrap. Fill these in the dashboard, deploy, open the
      # Render Shell and run `npm run seed:admin`, then delete them again.
      - key: ADMIN_NAME
        sync: false          # e.g. Studio Admin
      - key: ADMIN_EMAIL
        sync: false          # e.g. admin@kadambastudio.com
      - key: ADMIN_PASSWORD
        sync: false          # strong password, >= 8 chars

  # Frontend SPA — rewrite all paths to index.html so /admin/login etc. work.
  - type: web
    name: kadamba
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        sync: false          # https://kadamba-api.onrender.com/api
      - key: VITE_SITE_URL
        sync: false          # https://kadamba-3lc7.onrender.com
      - key: VITE_APP_NAME
        value: "Kadamba's Designer Studio"
