# Render Blueprint for the Kadamba backend API.
# Secrets (sync: false) must be filled in the Render dashboard after import.
services:
  - type: web
    name: kadamba-api
    runtime: node
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: info
      # PORT is provided automatically by Render.
      - key: FRONTEND_URL
        sync: false          # e.g. https://kadambastudio.com
      - key: MONGODB_URI
        sync: false          # MongoDB Atlas SRV connection string
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
